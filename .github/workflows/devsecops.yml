name: DevSecOps Pipeline

on:
  push:
    branches: [ DEV ]

jobs:
  security-and-build:
    runs-on: [self-hosted, secops]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Load Environment
        run: |
          if [ -f /opt/backuphub/.env ]; then
            grep -v '^#' /opt/backuphub/.env >> $GITHUB_ENV
          fi

      - name: SAST Semgrep Scan
        id: semgrep
        continue-on-error: true
        run: |
          docker compose -f /opt/backuphub/devsecops/docker-compose.yml run --rm \
            -v ${{ github.workspace }}:/src \
            sast-semgrep semgrep scan --config=p/owasp-top-10 --metrics=off --json --output=sast.json /src

      - name: Build Image
        run: |
          docker build --no-cache -t $REGISTRY_URL/backuphub/app:${{ github.sha }} -f compose/Dockerfile .

      - name: SCA Grype Scan
        id: grype
        continue-on-error: true
        run: |
          docker compose -f /opt/backuphub/devsecops/docker-compose.yml run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -e GRYPE_DB_AUTO_UPDATE=false \
            -e GRYPE_DB_VALIDATE_LISTING=false \
            -e GRYPE_CHECK_FOR_APP_UPDATE=false \
            sca-grype $REGISTRY_URL/backuphub/app:${{ github.sha }} -o json > sca.json

      - name: Push to Registry
        run: |
          echo "$REGISTRY_PASSWORD" | docker login $REGISTRY_URL -u "$REGISTRY_USER" --password-stdin
          docker push $REGISTRY_URL/backuphub/app:${{ github.sha }}
          docker tag $REGISTRY_URL/backuphub/app:${{ github.sha }} $REGISTRY_URL/backuphub/app:dev-latest
          docker push $REGISTRY_URL/backuphub/app:dev-latest

      - name: Report to DefectDojo
        if: always()
        run: |
          SCAN_DATE=$(date +%Y-%m-%d)
          
          if [ -s sast.json ]; then
            curl -X POST "$DOJO_URL/api/v2/import-scan/" \
              -H "Authorization: Token $DOJO_TOKEN" \
              -F "scan_type=Semgrep JSON Report" \
              -F "file=@sast.json" \
              -F "product_name=BackupHub" \
              -F "engagement_name=Build-${{ github.run_number }}" \
              -F "scan_date=$SCAN_DATE" \
              -F "active=true" \
              -F "verified=true" \
              -F "close_old_findings=false"
          fi
          
          if [ -s sca.json ]; then
            curl -X POST "$DOJO_URL/api/v2/import-scan/" \
              -H "Authorization: Token $DOJO_TOKEN" \
              -F "scan_type=Anchore Grype" \
              -F "file=@sca.json" \
              -F "product_name=BackupHub" \
              -F "engagement_name=Build-${{ github.run_number }}" \
              -F "scan_date=$SCAN_DATE" \
              -F "active=true" \
              -F "verified=true" \
              -F "close_old_findings=false"
          fi

  deploy:
    needs: security-and-build
    runs-on: [self-hosted, dev]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Prepare Deployment Configuration
        run: |
          if [ -f /opt/backuphub/app/deploy.docker-compose.yml ]; then
            cp /opt/backuphub/app/deploy.docker-compose.yml ./deploy.docker-compose.yml
            sed -i "s|image: $REGISTRY_URL/backuphub/app:.*|image: $REGISTRY_URL/backuphub/app:${{ github.sha }}|g" deploy.docker-compose.yml
          else
            exit 1
          fi

      - name: Pull and Restart App
        run: |
          echo "$REGISTRY_PASSWORD" | docker login $REGISTRY_URL -u "$REGISTRY_USER" --password-stdin
          docker compose -f deploy.docker-compose.yml pull
          docker compose -f deploy.docker-compose.yml up -d
          docker image prune -f --filter "until=24h"

  dast:
    needs: deploy
    runs-on: [self-hosted, secops]
    steps:
      - name: Load Environment
        run: |
          if [ -f /opt/backuphub/.env ]; then
            grep -v '^#' /opt/backuphub/.env >> $GITHUB_ENV
          fi

      - name: DAST Scan (ZAP)
        id: zap
        continue-on-error: true
        run: |
          touch dast.json && chmod 666 dast.json
          docker compose -f /opt/backuphub/devsecops/docker-compose.yml run --rm --user root -v $(pwd):/zap/wrk/:rw dast-zap zap-baseline.py -t $APP_URL_DEV -J dast.json

      - name: Report DAST to Dojo
        if: always()
        run: |
          SCAN_DATE=$(date +%Y-%m-%d)
          
          if [ -s dast.json ]; then
            curl -X POST "$DOJO_URL/api/v2/import-scan/" \
              -H "Authorization: Token $DOJO_TOKEN" \
              -F "scan_type=ZAP Scan" \
              -F "file=@dast.json" \
              -F "product_name=BackupHub" \
              -F "engagement_name=Build-${{ github.run_number }}" \
              -F "scan_date=$SCAN_DATE" \
              -F "active=true" \
              -F "verified=true" \
              -F "close_old_findings=false"
          fi
