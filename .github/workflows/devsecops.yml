name: DevSecOps Pipeline

on:
  push:
    branches: [ DEV ]

jobs:
  security-and-build:
    runs-on: [self-hosted, secops]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Load Environment
        run: grep -v '^#' /opt/backuphub/.env >> $GITHUB_ENV

      - name: Log in to Docker Registry
        run: |
          echo "$REGISTRY_PASSWORD" | docker login $REGISTRY_URL -u "$REGISTRY_USER" --password-stdin

      - name: SAST Semgrep Scan
        run: docker compose -f /opt/backuphub/devsecops/docker-compose.yml run --rm -v ${{ github.workspace }}:/src sast-semgrep semgrep scan --json --output=sast.json /src || true

      - name: Build Image
        run: docker build -t $REGISTRY_URL/backuphub/app:${{ github.sha }} -f compose/Dockerfile .

      - name: SCA Grype Scan
        run: |
          docker compose -f /opt/backuphub/devsecops/docker-compose.yml run --rm -v /var/run/docker.sock:/var/run/docker.sock sca-grype docker:$REGISTRY_URL/backuphub/app:${{ github.sha }} -o json > sca.json
          docker compose -f /opt/backuphub/devsecops/docker-compose.yml run --rm -v /var/run/docker.sock:/var/run/docker.sock sca-grype docker:$REGISTRY_URL/backuphub/app:${{ github.sha }} --fail-on critical

      - name: Push to Registry
        run: |
          docker push $REGISTRY_URL/backuphub/app:${{ github.sha }}
          docker tag  $REGISTRY_URL/backuphub/app:${{ github.sha }} $REGISTRY_URL/backuphub/app:dev-latest
          docker push $REGISTRY_URL/backuphub/app:dev-latest

      - name: Report to DefectDojo
        if: always()
        run: |
          [ -f sast.json ] && curl -X POST "$DOJO_URL/api/v2/import-scan/" -H "Authorization: Token $DOJO_TOKEN" -F "scan_type=Semgrep JSON Report" -F "file=@sast.json" -F "product_id=$DOJO_PRODUCT_ID" -F "engagement_name=Build-${{ github.run_number }}" || echo "sast.json not found"
          [ -f sca.json ] && curl -X POST "$DOJO_URL/api/v2/import-scan/" -H "Authorization: Token $DOJO_TOKEN" -F "scan_type=Anchore Grype" -F "file=@sca.json" -F "product_id=$DOJO_PRODUCT_ID" -F "engagement_name=Build-${{ github.run_number }}" || echo "sca.json not found"

      - name: Cleanup SecOps Disk
        if: always()
        run: docker system prune -f

  deploy:
    needs: security-and-build
    runs-on: [self-hosted, dev]
    steps:
      - name: Load Environment
        run: grep -v '^#' /opt/backuphub/.env >> $GITHUB_ENV

      - name: Pull and Restart App
        run: |
          echo "$REGISTRY_PASSWORD" | docker login $REGISTRY_URL -u "$REGISTRY_USER" --password-stdin
          cd /opt/backuphub/app
          sed -i "s|image:.*|image: $REGISTRY_URL/backuphub/app:${{ github.sha }}|g" deploy.docker-compose.yml
          docker compose -f deploy.docker-compose.yml pull
          docker compose -f deploy.docker-compose.yml up -d
          docker image prune -f

  dast:
    needs: deploy
    runs-on: [self-hosted, secops]
    steps:
      - name: Load Environment
        run: grep -v '^#' /opt/backuphub/.env >> $GITHUB_ENV

      - name: DAST Scan (ZAP)
        run: |
          touch dast.json && chmod 666 dast.json
          docker compose -f /opt/backuphub/devsecops/docker-compose.yml run --rm --user root -v $(pwd):/zap/wrk/:rw dast-zap zap-baseline.py -t $APP_URL_DEV -J dast.json || true

      - name: Report DAST to Dojo
        if: always()
        run: |
          [ -f dast.json ] && curl -X POST "$DOJO_URL/api/v2/import-scan/" -H "Authorization: Token $DOJO_TOKEN" -F "scan_type=ZAP Scan" -F "file=@dast.json" -F "product_id=$DOJO_PRODUCT_ID" -F "engagement_name=Build-${{ github.run_number }}" || echo "dast.json not found"

      - name: Final Disk Cleanup
        if: always()
        run: docker system prune -f
