name: DevSecOps Pipeline
on:
  push:
    branches: [ DEV ]

jobs:
  security-and-build:
    runs-on: [self-hosted, secops]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Load Environment
        run: grep -v '^#' /opt/backuphub/.env >> $GITHUB_ENV

      - name: Pre-Build Disk Cleanup
        run: |
          docker system prune -f
          docker builder prune -f

      - name: SAST Semgrep Scan
        run: |
          # Исправлено: пишем напрямую в монтируемую папку /src/sast.json
          docker compose -f /opt/backuphub/devsecops/docker-compose.yml run --rm \
            -v ${{ github.workspace }}:/src \
            sast-semgrep semgrep scan --config=p/owasp-top-10 --metrics=off --json --output=/src/sast.json --error /src || true

      - name: Build Image
        run: |
          docker build --no-cache -t $REGISTRY_URL/backuphub/app:${{ github.sha }} -f compose/Dockerfile .

      - name: Login to Registry
        run: |
          echo "$REGISTRY_PASSWORD" | docker login $REGISTRY_URL -u "$REGISTRY_USER" --password-stdin

      - name: SCA Grype Scan
        run: |
          # Исправлено: добавлен флаг -T, чтобы отключить TTY и убрать мусор из JSON
          docker compose -f /opt/backuphub/devsecops/docker-compose.yml run -T --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -e GRYPE_DB_AUTO_UPDATE=false \
            -e GRYPE_DB_VALIDATE_LISTING=false \
            -e GRYPE_CHECK_FOR_APP_UPDATE=false \
            sca-grype $REGISTRY_URL/backuphub/app:${{ github.sha }} -o json > sca.json || true

      - name: Push to Registry
        run: |
          docker push $REGISTRY_URL/backuphub/app:${{ github.sha }}
          docker tag $REGISTRY_URL/backuphub/app:${{ github.sha }} $REGISTRY_URL/backuphub/app:dev-latest
          docker push $REGISTRY_URL/backuphub/app:dev-latest

      - name: Report Build Scans to DefectDojo
        if: always()
        run: |
          SCAN_DATE=$(date +%Y-%m-%d)
          [ -s sast.json ] && curl -X POST "$DOJO_URL/api/v2/import-scan/" -H "Authorization: Token $DOJO_TOKEN" -F "scan_type=Semgrep JSON Report" -F "file=@sast.json" -F "product_id=$DOJO_PRODUCT_ID" -F "product_name=BackupHub" -F "engagement_name=Build-${{ github.run_number }}" -F "scan_date=$SCAN_DATE" -F "auto_create_context=true" || true
          [ -s sca.json ] && curl -X POST "$DOJO_URL/api/v2/import-scan/" -H "Authorization: Token $DOJO_TOKEN" -F "scan_type=Anchore Grype" -F "file=@sca.json" -F "product_id=$DOJO_PRODUCT_ID" -F "product_name=BackupHub" -F "engagement_name=Build-${{ github.run_number }}" -F "scan_date=$SCAN_DATE" -F "auto_create_context=true" || true

      - name: Post-Build Disk Cleanup
        if: always()
        run: |
          docker system prune -f
          docker builder prune -f

  deploy:
    needs: security-and-build
    runs-on: [self-hosted, dev]
    steps:
      - name: Load Environment
        run: grep -v '^#' /opt/backuphub/.env >> $GITHUB_ENV

      - name: Pull and Restart App
        run: |
          echo "$REGISTRY_PASSWORD" | docker login $REGISTRY_URL -u "$REGISTRY_USER" --password-stdin
          cd /opt/backuphub/app
          sed -i "s|image: $REGISTRY_URL/backuphub/app:.*|image: $REGISTRY_URL/backuphub/app:${{ github.sha }}|g" deploy.docker-compose.yml
          docker compose -f deploy.docker-compose.yml pull
          docker compose -f deploy.docker-compose.yml up -d
          docker image prune -f

  dast:
    needs: deploy
    runs-on: [self-hosted, secops]
    steps:
      - name: Load Environment
        run: grep -v '^#' /opt/backuphub/.env >> $GITHUB_ENV

      - name: DAST Scan (ZAP)
        run: |
          # Исправлено: добавлен -T и принудительное изменение прав (chmod 666) внутри контейнера, чтобы хост мог прочесть файл
          docker compose -f /opt/backuphub/devsecops/docker-compose.yml run -T --rm --user root \
            -v ${{ github.workspace }}:/zap/wrk/:rw \
            dast-zap bash -c "zap-baseline.py -t $APP_URL_DEV -J dast.json || true; chmod 666 /zap/wrk/dast.json"

      - name: Report DAST to Dojo
        if: always()
        run: |
          SCAN_DATE=$(date +%Y-%m-%d)
          [ -s ${{ github.workspace }}/dast.json ] && curl -X POST "$DOJO_URL/api/v2/import-scan/" -H "Authorization: Token $DOJO_TOKEN" -F "scan_type=ZAP Scan" -F "file=@${{ github.workspace }}/dast.json" -F "product_id=$DOJO_PRODUCT_ID" -F "product_name=BackupHub" -F "engagement_name=Build-${{ github.run_number }}" -F "scan_date=$SCAN_DATE" -F "auto_create_context=true" || true
          docker system prune -f
