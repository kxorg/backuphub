name: Deploy PROD

on:
  push:
    branches:
      - PROD
    paths-ignore:
      - "docs/**"
      - "README.md"
      - "**/*.md"

permissions:
  contents: read

jobs:
  deploy:
    name: Pull code and restart PROD app
    runs-on:
      group: Default
      labels: [self-hosted, Linux, X64, prod]

    steps:
      - name: Pull latest PROD code
        working-directory: /opt/backuphub/app
        run: |
          git fetch origin PROD
          git checkout PROD
          git pull --ff-only origin PROD

      - name: Prepare static files directory
        run: |
          sudo mkdir -p /opt/backuphub/static
          sudo chown -R 1000:1000 /opt/backuphub/static
          sudo chmod 755 /opt/backuphub/static

      - name: Restart application container
        working-directory: /opt/backuphub/app
        run: |
          docker compose -f deploy.docker-compose.yml down --remove-orphans
          docker compose -f deploy.docker-compose.yml up -d --build
          docker image prune -f

      - name: Show deploy result
        working-directory: /opt/backuphub/app
        run: |
          docker compose -f deploy.docker-compose.yml ps
          curl -k -I https://prod.backuphub.spb.ru/
