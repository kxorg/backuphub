name: Deploy DEV

on:
  push:
    branches:
      - DEV
    paths-ignore:
      - "docs/**"
      - "README.md"
      - "**/*.md"

permissions:
  contents: read

jobs:
  deploy:
    name: Pull code and restart DEV app
    runs-on: [self-hosted, backuphub-dev]

    steps:
      - name: Pull latest DEV code
        working-directory: /opt/backuphub/app
        run: |
          git fetch origin DEV
          git checkout DEV
          git pull --ff-only origin DEV

      - name: Restart application container
        working-directory: /opt/backuphub/app
        run: |
          docker compose -f deploy.docker-compose.yml down --remove-orphans
          docker compose -f deploy.docker-compose.yml up -d --build
          docker image prune -f

      - name: Show deploy result
        working-directory: /opt/backuphub/app
        run: |
          docker compose -f deploy.docker-compose.yml ps
          curl -k -I https://dev.backuphub.spb.ru/
