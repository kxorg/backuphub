<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BackupHub - Live Dashboard Demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .stat-card { transition: all 0.3s ease; }
        .stat-card.updated { background-color: #fff3cd !important; border-color: #ffecb5 !important; }
        .badge-in_progress { background-color: #ffc107; color: #000; }
        .badge-success { background-color: #198754; }
        .badge-error { background-color: #dc3545; }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="#">BackupHub <span class="badge bg-success">Live Demo</span></a>
    </div>
</nav>

<div class="container">
    <h2 class="mb-4">Dashboard (AJAX Polling Demo)</h2>

    <!-- Виджеты статистики -->
    <div class="row mb-4">
        <div class="col-md-3">
            <div class="card stat-card text-center" id="card-total-systems">
                <div class="card-body">
                    <h6 class="card-title text-muted">Total Systems</h6>
                    <h2 id="stat-total-systems">-</h2>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card stat-card text-center" id="card-total-backups">
                <div class="card-body">
                    <h6 class="card-title text-muted">Total Backups</h6>
                    <h2 id="stat-total-backups">-</h2>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card stat-card text-center" id="card-in-progress">
                <div class="card-body">
                    <h6 class="card-title text-muted">In Progress (24h)</h6>
                    <h2 id="stat-in-progress-24h" class="text-warning">-</h2>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card stat-card text-center" id="card-errors">
                <div class="card-body">
                    <h6 class="card-title text-muted">Errors (24h)</h6>
                    <h2 id="stat-error-24h" class="text-danger">-</h2>
                </div>
            </div>
        </div>
    </div>

    <!-- Таблица последних операций -->
    <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
            <h5 class="mb-0">Recent Operations</h5>
            <span class="badge bg-primary" id="polling-status">Polling active...</span>
        </div>
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                    <tr>
                        <th>System / Host</th>
                        <th>Status</th>
                        <th>Started At</th>
                        <th>Size</th>
                    </tr>
                </thead>
                <tbody id="recent-operations-body">
                    <tr><td colspan="4" class="text-center py-3">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // Функция обновления текста с подсветкой
    function updateStat(elementId, newValue, cardId) {
        const el = document.getElementById(elementId);
        if (el && el.textContent !== String(newValue)) {
            el.textContent = newValue;
            // Подсвечиваем карточку при изменении
            const card = document.getElementById(cardId);
            if (card) {
                card.classList.add('updated');
                setTimeout(() => card.classList.remove('updated'), 1500);
            }
        }
    }

    // Функция перерисовки таблицы
    function updateTable(operations) {
        const tbody = document.getElementById('recent-operations-body');
        if (!tbody) return;

        let html = '';
        if (operations.length === 0) {
            html = `<tr><td colspan="4" class="text-center text-muted py-3">No operations yet</td></tr>`;
        } else {
            operations.forEach(op => {
                let badgeClass = 'bg-secondary';
                if (op.status === 'success') badgeClass = 'badge-success';
                else if (op.status === 'error') badgeClass = 'badge-error';
                else if (op.status === 'in_progress') badgeClass = 'badge-in_progress';

                html += `
                    <tr>
                        <td>
                            <strong>${op.system_name}</strong><br>
                            <small class="text-muted">${op.hostname}</small>
                        </td>
                        <td><span class="badge ${badgeClass}">${op.status}</span></td>
                        <td>${op.started_at}</td>
                        <td>${op.size_human}</td>
                    </tr>
                `;
            });
        }
        
        // Обновляем DOM
        tbody.innerHTML = html;
    }

    // Запускаем polling
    document.addEventListener('DOMContentLoaded', () => {
        setInterval(() => {
            fetch('/api/ui-refresh/dashboard/')
                .then(response => {
                    if (!response.ok) throw new Error('Network response was not ok');
                    return response.json();
                })
                .then(data => {
                    // Обновляем цифры
                    updateStat('stat-total-systems', data.total_systems, 'card-total-systems');
                    updateStat('stat-total-backups', data.total_backups, 'card-total-backups');
                    updateStat('stat-in-progress-24h', data.in_progress_24h, 'card-in-progress');
                    updateStat('stat-error-24h', data.error_24h, 'card-errors');
                    
                    // Обновляем таблицу
                    updateTable(data.recent_operations);
                    
                    // Индикатор статуса
                    document.getElementById('polling-status').innerText = 'Updated just now';
                })
                .catch(error => {
                    console.error('Polling error:', error);
                    document.getElementById('polling-status').innerText = 'Connection error';
                    document.getElementById('polling-status').className = 'badge bg-danger';
                });
        }, 5000); // Каждые 5 секунд
    });
</script>

</body>
</html>
