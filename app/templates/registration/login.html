{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | BackupHub</title>
    <link rel="stylesheet" href="{% static 'style/bootstrap.min.css' %}">
    <link rel="icon" type="image/png" href="{% static 'images/favicon.png' %}">
</head>
<body class="bg-light d-flex align-items-center justify-content-center vh-100">

    <div class="w-100 style-container" style="max-width: 400px; padding: 15px;">
        <div class="card shadow-sm p-4 bg-white rounded">
            
            <h3 class="text-center mb-4 fw-bold">Sign In</h3>

            {% if form.errors %}
                <div class="alert alert-danger py-2 text-center" role="alert" style="font-size: 14px;">
                    Invalid username or password.
                </div>
            {% endif %}

            <form method="post" action="{% url 'login' %}">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label fw-semibold">Username</label>
                    <input type="text" name="username" class="form-control" required autocomplete="username">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Password</label>
                    <input type="password" name="password" class="form-control" required autocomplete="current-password">
                </div>
                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" id="rememberMe">
                    <label class="form-check-label text-muted" for="rememberMe">Remember me</label>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">Login</button>
            </form>

        </div>
    </div>

</body>
</html>
