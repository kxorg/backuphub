{% extends "base.html" %}

{% block content %}
<div class="card shadow-sm p-4 border-0 border-start border-danger border-4">
    <h2 class="fw-bold text-danger mb-3">Deleting a server</h2>
    <p>Are you sure you want to delete the host? <strong>{{ host.hostname }}</strong> ({{ host.ip_address }})?</p>
    <form method="POST">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Yes, delete</button>
        <a href="{% url 'servers' %}" class="btn btn-light">Cancel</a>
    </form>
</div>
{% endblock %}
