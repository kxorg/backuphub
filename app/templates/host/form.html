{% extends "base.html" %}

{% block title %}{% if host %}Edit server{% else %}Add server{% endif %} | BackupHub{% endblock %}

{% block content %}
<div class="card shadow-sm p-4 border-0">
    <h2 class="fw-bold mb-4">{% if host %}Edit server{% else %}Add server{% endif %}</h2>
    <form method="POST">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label">Hostname</label>
            <input type="text" name="hostname" class="form-control" value="{{ host.hostname|default:'' }}" placeholder="for example, db-server-01" required>
        </div>
        <div class="mb-3">
            <label class="form-label">IP address</label>
            <input type="text" name="ip_address" class="form-control" value="{{ host.ip_address|default:'' }}" placeholder="for example, 192.168.1.50" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Observed system</label>
            <select name="target_system" class="form-select" required>
                <option value="" disabled {% if not host %}selected{% endif %}>Select system...</option>
                {% for system in systems %}
                    <option value="{{ system.id }}" {% if host.target_system.id == system.id %}selected{% endif %}>
                        {{ system.name }} ({{ system.system_type }})
                    </option>
                {% endfor %}
            </select>
        </div>
        <button type="submit" class="btn btn-success">Save</button>
        <a href="{% url 'host_list' %}" class="btn btn-light">Cancel</a>
    </form>
</div>
{% endblock %}
