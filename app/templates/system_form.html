{% extends "base.html" %}

{% block content %}
<div class="card shadow-sm p-4 border-0">
    <h2 class="fw-bold mb-4">{% if system %}Edit system{% else %}Create a system{% endif %}</h2>
    <form method="POST">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label">System name</label>
            <input type="text" name="name" class="form-value form-control" value="{{ system.name|default:'' }}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">System type</label>
            <input type="text" name="system_type" class="form-control" value="{{ system.system_type|default:'' }}" required>
        </div>
        <button type="submit" class="btn btn-success">Save</button>
        <a href="{% url 'system_settings' %}" class="btn btn-light">Cancel</a>
    </form>
</div>
{% endblock %}
