{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}BackupHub{% endblock %}</title>
    <!-- Подключаем ваш локальный Bootstrap CSS -->
    <link rel="stylesheet" href="{% static 'style/bootstrap.min.css' %}">
</head>
<body class="bg-light d-flex flex-column min-vh-100">

    <!-- Навигационная панель Bootstrap (Темная тема) -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand text-info fw-bold" href="{% url 'index' %}">💾 BackupHub</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'index' %}">Дашборд</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'settings' %}">Настройки</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Основной контент -->
    <main class="container my-4 flex-grow-1">
        {% block content %}
        {% endblock %}
    </main>

    <!-- Подвал -->
    <footer class="bg-dark text-secondary text-center py-3 mt-auto">
        <div class="container">
            <p class="mb-0">&copy; 2026 BackupHub &bull; Система мониторинга и учета резервного копирования</p>
        </div>
    </footer>

    <!-- Подключаем ваш локальный Bootstrap JS -->
    <script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>
</body>
</html>
